<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>国画管理</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <section id="auth-screen" class="auth-screen">
      <div class="auth-panel">
        <span class="eyebrow">纸墨入门</span>
        <div class="title-row">
          <h1>国画典藏管理</h1>
          <span class="seal">印</span>
        </div>
        <p>登录后整理自己的作品、素材、题跋与资料。</p>
        <div class="auth-grid">
          <form id="login-form" class="auth-form">
            <h2>登录</h2>
            <label>
              用户名
              <input name="username" type="text" autocomplete="username" required />
            </label>
            <label>
              密码
              <input name="password" type="password" autocomplete="current-password" required />
            </label>
            <button type="submit">入册</button>
          </form>
          <form id="register-form" class="auth-form">
            <h2>注册</h2>
            <label>
              用户名
              <input name="username" type="text" autocomplete="username" required />
            </label>
            <label>
              显示名称
              <input name="displayName" type="text" placeholder="如：石涛后学" />
            </label>
            <label>
              密码
              <input name="password" type="password" autocomplete="new-password" minlength="8" required />
            </label>
            <button type="submit">新建案卷</button>
          </form>
        </div>
        <div id="auth-message" class="message"></div>
      </div>
    </section>

    <main id="app-shell" class="container hidden">
      <header class="header">
        <div class="header-copy">
          <span class="eyebrow">纸墨案卷</span>
          <div class="title-row">
            <h1>国画典藏管理</h1>
            <span class="seal">雅集</span>
          </div>
          <p>以馆藏案卷的方式整理作品、素材与题跋，让每一幅画的笔墨、来源和评语都有清楚归处。</p>
        </div>
        <div class="header-aside" aria-hidden="true">
          <span>山水</span>
          <span>花鸟</span>
          <span>人物</span>
        </div>
        <div class="user-summary">
          <img id="current-user-avatar" class="user-avatar" alt="" />
          <div>
            <strong id="current-user-name"></strong>
            <span id="current-user-username"></span>
          </div>
          <button id="logout-btn" type="button" class="ghost">退出</button>
        </div>
      </header>

      <nav class="tabs" aria-label="功能分区">
        <button
          id="tab-btn-paintings"
          class="tab-btn active"
          type="button"
          data-tab-target="paintings"
        >
          作品管理
        </button>
        <button
          id="tab-btn-materials"
          class="tab-btn"
          type="button"
          data-tab-target="materials"
        >
          素材管理
        </button>
        <button
          id="tab-btn-profile"
          class="tab-btn"
          type="button"
          data-tab-target="profile"
        >
          个人资料
        </button>
      </nav>

      <section id="tab-pane-paintings" class="tab-pane active" data-tab-pane="paintings">
        <section class="panel">
          <h2>作品入藏</h2>
          <form id="upload-form">
            <div class="grid">
              <label>
                作品题名
                <input name="title" type="text" placeholder="如：溪山清远图" required />
              </label>
              <label>
                画科分类
                <input
                  name="category"
                  type="text"
                  placeholder="如：山水 / 花鸟 / 人物"
                  required
                />
              </label>
            </div>
            <label>
              题跋简介
              <textarea
                name="description"
                rows="3"
                placeholder="可写技法、创作时间、灵感来源等"
              ></textarea>
            </label>
            <label>
              作品图像
              <input name="image" type="file" accept="image/jpeg,image/png,image/webp" multiple required />
            </label>
            <button type="submit">收入作品册</button>
          </form>
        </section>

        <section class="panel">
          <h2>作品册</h2>
          <div class="toolbar">
            <label>
              按画科筛选
              <select id="filter-category">
                <option value="">全部分类</option>
              </select>
            </label>
            <label>
              检索题名
              <input id="search-input" type="text" placeholder="题名 / 画科 / 题跋 / 评语" />
            </label>
          </div>
          <div class="toolbar-actions">
            <button id="search-btn" type="button">检索案卷</button>
            <button id="reset-btn" type="button" class="ghost">清空条件</button>
          </div>
          <div id="message" class="message"></div>
          <div id="paintings" class="cards"></div>
          <div id="pagination" class="pagination hidden">
            <button id="prev-page-btn" type="button" class="ghost">上一页</button>
            <span id="page-info" class="page-info"></span>
            <button id="next-page-btn" type="button" class="ghost">下一页</button>
          </div>
        </section>
      </section>

      <section id="tab-pane-materials" class="tab-pane" data-tab-pane="materials">
        <section class="panel">
          <h2>素材入库</h2>
          <form id="material-upload-form">
            <div class="grid">
              <label>
                素材题名
                <input name="title" type="text" placeholder="如：石纹参考 / 水墨过程片段" required />
              </label>
              <label>
                素材分类
                <input
                  name="category"
                  type="text"
                  placeholder="如：纹理 / 构图 / 临摹 / 视频教程"
                  required
                />
              </label>
            </div>
            <label>
              素材说明
              <textarea
                name="description"
                rows="3"
                placeholder="记录素材来源、用途、要点说明等"
              ></textarea>
            </label>
            <label>
              文件（图片或视频，素材最大 100MB）
              <input
                name="asset"
                type="file"
                multiple
                accept="image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime,video/x-matroska"
                required
              />
            </label>
            <button type="submit">收入素材库</button>
          </form>
        </section>

        <section class="panel">
          <h2>素材库</h2>
          <div class="toolbar">
            <label>
              按类别筛选
              <select id="material-filter-category">
                <option value="">全部分类</option>
              </select>
            </label>
            <label>
              检索题名
              <input id="material-search-input" type="text" placeholder="名称/分类/说明" />
            </label>
          </div>
          <div class="toolbar-actions">
            <button id="material-search-btn" type="button">检索素材</button>
            <button id="material-reset-btn" type="button" class="ghost">清空条件</button>
          </div>
          <div id="material-message" class="message"></div>
          <div id="materials" class="cards"></div>
          <div id="material-pagination" class="pagination hidden">
            <button id="material-prev-page-btn" type="button" class="ghost">上一页</button>
            <span id="material-page-info" class="page-info"></span>
            <button id="material-next-page-btn" type="button" class="ghost">下一页</button>
          </div>
        </section>
      </section>

      <section id="tab-pane-profile" class="tab-pane" data-tab-pane="profile">
        <section class="panel profile-panel">
          <h2>个人资料</h2>
          <div class="profile-layout">
            <form id="profile-form">
              <label>
                显示名称
                <input name="displayName" type="text" required />
              </label>
              <label>
                简介
                <textarea name="bio" rows="5" placeholder="写下你的笔墨偏好、创作方向或收藏说明"></textarea>
              </label>
              <button type="submit">保存资料</button>
            </form>
            <form id="avatar-form">
              <label>
                头像
                <input name="avatar" type="file" accept="image/jpeg,image/png,image/webp" required />
              </label>
              <button type="submit">更新头像</button>
            </form>
            <form id="password-form">
              <label>
                当前密码
                <input name="currentPassword" type="password" autocomplete="current-password" required />
              </label>
              <label>
                新密码
                <input name="newPassword" type="password" autocomplete="new-password" minlength="8" required />
              </label>
              <button type="submit">修改密码</button>
            </form>
          </div>
          <div id="profile-message" class="message"></div>
        </section>
      </section>
    </main>

    <template id="painting-template">
      <article class="card">
        <div class="painting-media media-shell">
          <img class="painting-preview-image media-thumb hidden" alt="" />
          <video class="painting-preview-video media-thumb hidden" preload="metadata" muted playsinline></video>
          <span class="image-tip painting-tip">单击预览</span>
        </div>
        <div class="attachment-strip painting-attachments"></div>
        <div class="card-content">
          <h3 class="painting-title"></h3>
          <p class="meta"></p>
          <p class="description"></p>

          <div class="card-actions">
            <button type="button" class="edit-btn">修改</button>
            <button type="button" class="delete-btn danger">删除</button>
          </div>

          <form class="edit-form hidden">
            <div class="grid">
              <label>
                标题
                <input name="title" type="text" required />
              </label>
              <label>
                分类
                <input name="category" type="text" required />
              </label>
            </div>
            <label>
              题跋简介
              <textarea name="description" rows="3"></textarea>
            </label>
            <label>
              替换图片（可选）
              <input name="image" type="file" accept="image/jpeg,image/png,image/webp" />
            </label>
            <div class="edit-actions">
              <button type="submit">保存修改</button>
              <button type="button" class="ghost cancel-edit-btn">取消</button>
            </div>
          </form>

          <form class="append-attachment-form">
            <label>
              追加图像
              <input
                name="image"
                type="file"
                accept="image/jpeg,image/png,image/webp"
                multiple
                required
              />
            </label>
            <div class="edit-actions">
              <button type="submit">追加附件</button>
            </div>
          </form>

          <div class="comments">
            <h4>评语</h4>
            <ul class="comment-list"></ul>
            <form class="comment-form">
              <input name="comment" type="text" placeholder="写下鉴赏、修订或展陈备注" required />
              <button type="submit">添评</button>
            </form>
          </div>
        </div>
      </article>
    </template>

    <template id="material-template">
      <article class="card">
        <div class="material-media media-shell">
          <img class="material-preview-image media-thumb hidden" alt="" />
          <video class="material-preview-video media-thumb hidden" preload="metadata" muted playsinline></video>
          <span class="image-tip material-tip">单击预览</span>
        </div>
        <div class="attachment-strip material-attachments"></div>
        <div class="card-content">
          <h3 class="material-title"></h3>
          <p class="meta material-meta"></p>
          <p class="description material-description"></p>

          <div class="card-actions">
            <button type="button" class="material-edit-btn">修改</button>
            <button type="button" class="material-delete-btn danger">删除</button>
          </div>

          <form class="material-edit-form hidden">
            <div class="grid">
              <label>
                素材名称
                <input name="title" type="text" required />
              </label>
              <label>
                素材分类
                <input name="category" type="text" required />
              </label>
            </div>
            <label>
              说明
              <textarea name="description" rows="3"></textarea>
            </label>
            <label>
              替换文件（可选，图片或视频，素材最大 100MB）
              <input
                name="asset"
                type="file"
                accept="image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime,video/x-matroska"
              />
            </label>
            <div class="edit-actions">
              <button type="submit">保存修改</button>
              <button type="button" class="ghost material-cancel-edit-btn">取消</button>
            </div>
          </form>

          <form class="material-append-attachment-form">
            <label>
              追加文件（图片或视频，素材最大 100MB）
              <input
                name="asset"
                type="file"
                accept="image/jpeg,image/png,image/webp,video/mp4,video/webm,video/quicktime,video/x-matroska"
                multiple
                required
              />
            </label>
            <div class="edit-actions">
              <button type="submit">追加附件</button>
            </div>
          </form>
        </div>
      </article>
    </template>

    <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true">
      <button id="lightbox-close" class="lightbox-close" type="button" aria-label="关闭预览">
        关闭
      </button>
      <div class="lightbox-content">
        <img id="lightbox-image" class="lightbox-image hidden" alt="" />
        <video
          id="lightbox-video"
          class="lightbox-video hidden"
          controls
          preload="metadata"
          playsinline
        ></video>
        <p id="lightbox-caption" class="lightbox-caption"></p>
      </div>
    </div>

    <script src="/file-selection.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
